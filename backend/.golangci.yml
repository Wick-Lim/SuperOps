run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - misspell
    - gofmt
    - goimports

linters-settings:
  goimports:
    local-prefixes: github.com/Wick-Lim/SuperOps/backend

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
