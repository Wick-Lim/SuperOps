apiVersion: v2
name: superops
description: Self-hosted messenger platform
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: postgresql
    version: "~16.0"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
  - name: redis
    version: "~20.0"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: redis.enabled
  - name: nats
    version: "~1.2"
    repository: "https://nats-io.github.io/k8s/helm/charts/"
    condition: nats.enabled
  - name: minio
    version: "~14.0"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: minio.enabled
