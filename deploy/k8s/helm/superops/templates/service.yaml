apiVersion: v1
kind: Service
metadata:
  name: {{ include "superops.fullname" . }}-backend
  labels:
    {{- include "superops.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    {{- include "superops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "superops.fullname" . }}-frontend
  labels:
    {{- include "superops.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    {{- include "superops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
