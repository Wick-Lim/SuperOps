apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "superops.fullname" . }}-backend
  labels:
    {{- include "superops.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "superops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
