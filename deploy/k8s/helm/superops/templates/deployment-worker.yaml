apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "superops.fullname" . }}-worker
  labels:
    {{- include "superops.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "superops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "superops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          command: ["/app/worker"]
          envFrom:
            - configMapRef:
                name: {{ include "superops.fullname" . }}-config
            - secretRef:
                name: {{ include "superops.fullname" . }}-secret
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
