services:
  # --- Application ---
  backend:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.backend
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.backend
    command: ["/app/worker"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.frontend
    ports:
      - "3000:80"
    restart: unless-stopped

  migrate:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.backend
    command: ["/app/migrate", "-direction", "up"]
    env_file: .env
    environment:
      MIGRATIONS_PATH: "file:///app/migrations"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: superops
      POSTGRES_USER: superops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_db_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superops"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme_minio_password}
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.12
    volumes:
      - meili_data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme_meili_master_key}
    ports:
      - "7700:7700"
    restart: unless-stopped

  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # --- Monitoring (optional) ---
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    profiles: ["monitoring"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    profiles: ["monitoring"]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meili_data:
  prometheus_data:
  grafana_data:
